---
- name: Ensure the user exists
  user:
    name: "{{ vm_user }}"
    state: present

- name: Set user password
  user:
    name: "{{ vm_user }}"
    password: "{{ vm_password | password_hash('sha512') }}"
    update_password: always

# Ubuntu cloud images already ship the default user with NOPASSWD sudo and a
# locked root account; other distros (AlmaLinux, Debian) don't, so we grant
# it explicitly here to get the same sudo-first experience everywhere.
# validate runs visudo before installing, so a bad file is never written.
- name: Grant {{ vm_user }} passwordless sudo
  copy:
    dest: "/etc/sudoers.d/{{ vm_user }}"
    content: "{{ vm_user }} ALL=(ALL) NOPASSWD: ALL\n"
    mode: '0440'
    validate: 'visudo -cf %s'

# AlmaLinux's installer requires setting a root password (unlike Ubuntu,
# which locks root from the start), so we keep it in sync with vm_password
# instead of leaving whatever the installer set.
- name: Set root password (Debian and AlmaLinux only)
  user:
    name: root
    password: "{{ vm_password | password_hash('sha512') }}"
    update_password: always
  when:
    - ansible_facts.distribution in ["Debian", "AlmaLinux"]

- name: Debug - Passwords updated
  debug:
    msg: >-
      Password updated for user {{ vm_user }}
      {% if ansible_facts.distribution in ["Debian", "AlmaLinux"] %}
      and root
      {% endif %}
