---
- name: Ensure env_vars is defined and not empty
  fail:
    msg: "env_vars is not defined"
  when: env_vars is not defined or env_vars | length == 0

- name: Write environment variables to /etc/profile.d/plusclouds-env.sh
  copy:
    dest: /etc/profile.d/plusclouds-env.sh
    content: |
      {% for key, value in env_vars.items() %}
      export {{ key }}={{ value | quote }}
      {% endfor %}
    owner: root
    group: root
    mode: '0644'

- name: Write environment variables to /etc/environment
  lineinfile:
    path: /etc/environment
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value | quote }}"
    state: present
    create: yes
    owner: root
    group: root
    mode: '0644'
  loop: "{{ env_vars | dict2items }}"
