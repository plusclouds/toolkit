---
- name: Ensure /etc/plusclouds directory exists
  file:
    path: /etc/plusclouds
    state: directory
    mode: '0755'

- name: Move agent.yaml to /etc/plusclouds/agent.yaml
  command: mv agent.yaml /etc/plusclouds/agent.yaml
  args:
    chdir: "{{ package_dir | default(playbook_dir) }}"

- name: Ensure /var/log/plusclouds directory exists
  file:
    path: /var/log/plusclouds
    state: directory
    mode: '0755'

- name: Move plusclouds binary to /usr/local/bin/plusclouds
  command: mv plusclouds.service /usr/local/bin/plusclouds
  args:
    chdir: "{{ package_dir | default(playbook_dir) }}"

- name: Move plusclouds-agent.service to /etc/systemd/system
  command: mv plusclouds-agent.service /etc/systemd/system/plusclouds-agent.service
  args:
    chdir: "{{ package_dir | default(playbook_dir) }}"

# `mv` preserves the source SELinux context (e.g. tmp_t from /tmp/pc-config)
# instead of relabeling to systemd_unit_file_t/bin_t. Under enforcing SELinux
# (default on RHEL-family, unlike Ubuntu/Debian) systemd then can't see the
# unit at all, and the agent binary can fail to exec.
- name: Restore SELinux context for plusclouds files (RedHat family)
  command: "restorecon -v {{ item }}"
  loop:
    - /etc/systemd/system/plusclouds-agent.service
    - /usr/local/bin/plusclouds
  when: ansible_facts.os_family == "RedHat"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start plusclouds-agent service
  systemd:
    name: plusclouds-agent
    enabled: yes
    state: started
